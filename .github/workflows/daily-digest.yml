name: Daily Digest

on:
  schedule:
    # 07:00 KST daily (= 22:00 UTC previous day)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect news and generate digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL_FAST: ${{ vars.OPENROUTER_MODEL_FAST || 'google/gemini-3-flash-preview' }}
          OPENROUTER_MODEL_QUALITY: ${{ vars.OPENROUTER_MODEL_QUALITY || 'anthropic/claude-sonnet-4.6' }}
        run: |
          if [ -f scripts/collect_v2.py ]; then
            python scripts/collect_v2.py
          else
            python scripts/collect_news.py
          fi

      - name: Commit data
        run: |
          git config user.name "nydad-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data."
          else
            git commit -m "Daily digest $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Prepare deploy directory
        run: |
          mkdir -p _site/data
          # Use v2 files if they exist, otherwise fallback to v1
          if [ -f index-v2.html ]; then
            cp index-v2.html _site/index.html
          else
            cp index.html _site/index.html
          fi
          if [ -f app-v2.js ]; then
            cp app-v2.js _site/app.js
          else
            cp app.js _site/app.js
          fi
          # Copy any additional assets
          cp -r data/*.json _site/data/ 2>/dev/null || true

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - id: deploy
        uses: actions/deploy-pages@v4
