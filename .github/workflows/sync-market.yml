name: Sync Market Data

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Quick market data sync
        run: python scripts/sync_market.py

      - name: Commit live data
        run: |
          git config user.name "nydad-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/live.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Sync market data $(date -u +%Y-%m-%dT%H:%M)"
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deploy
        uses: actions/deploy-pages@v4
